name: pes_arena
description: Social platform for PES players - create groups, tournaments, and
  compete with your crew.
publish_to: "none"
version: 3.0.0+39

environment:
  sdk: ">=3.10.0 <4.0.0"
  flutter: ">=3.41.0"

dependencies:
  flutter:
    sdk: flutter

  visibility_detector: ^0.4.0+2

  # free icons
  cupertino_icons: ^1.0.8
  font_awesome_flutter: ^11.0.0

  flutter_svg: ^2.0.10+1

  # Database
  sqflite: ^2.0.2+1
  path: ^1.8.0

  # Dependency injection
  get_it: ^9.2.1

  provider: ^6.0.3
  go_router: ^14.0.0
  flutter_web_plugins:
    sdk: flutter
  equatable: ^2.0.3
  bloc: ^9.0.0
  flutter_bloc: ^9.1.1
  # Functional programming thingies
  dartz: ^0.10.1

  flutter_fortune_wheel: ^1.2.0

  file_picker: ^11.0.2
  share_plus: ^12.0.2

  shared_preferences: ^2.0.15

  fl_chart: ^1.0.0
  collection: ^1.18.0
  google_sign_in: ^7.2.0
  package_info_plus: ^9.0.1

  cached_network_image: ^3.4.0

  # Firebase
  firebase_auth: ^6.3.0
  firebase_core: ^4.6.0
  firebase_storage: ^13.2.0
  cloud_firestore: ^6.2.0
  firebase_messaging: ^16.1.3
  firebase_remote_config: ^6.0.0

  # URL Launcher
  url_launcher: ^6.3.0

  # Image picker
  image_picker: ^1.1.2

  # Flutter toast
  fluttertoast: ^9.0.0

  # Slidable list
  flutter_slidable: ^4.0.0

  # intl
  intl: ^0.20.2

  # Google Mobile Ads
  google_mobile_ads: ^8.0.0

dev_dependencies:
  flutter_test:
    sdk: flutter

  flutter_lints: ^6.0.0

  bloc_test: ^10.0.0
  mocktail: ^1.0.4
  fake_cloud_firestore: ^4.1.0

  flutter_launcher_icons: ^0.14.4

flutter:
  uses-material-design: true

  assets:
    - assets/images/
    - assets/icons/
    - assets/svg/

flutter_launcher_icons:
  image_path: "assets/images/icon_light.png"
  android: "launcher_icon"
  min_sdk_android: 21
  ios: true
  remove_alpha_ios: true
  image_path_ios_dark_transparent: "assets/images/icon.png"
  image_path_ios_tinted_grayscale: "assets/images/icon.png"
  desaturate_tinted_to_grayscale_ios: true
  web:
    generate: true
    image_path: "assets/images/icon_light.png"
    background_color: "#FAFAFA"
    theme_color: "#E8734A"
